name: CI & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  linux:
    name: Build & Package (Linux)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache Microchip DFP packs
      uses: actions/cache@v4
      with:
        path: avr-pack/
        key: dfp-linux-${{ hashFiles('CMakeLists.txt') }}

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-linux-${{ github.sha }}
        restore-keys: ccache-linux-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ninja-build ccache \
          gcc-avr avr-libc binutils-avr \
          python3

    - name: Configure CMake
      run: >
        cmake -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DVIOAVR_USE_NATIVE_ARCH=OFF
        -DVIOAVR_ALLOW_ANY_GENERATOR=ON
        -DVIOAVR_BUILD_COSIM=OFF

    - name: Build
      run: |
        ccache -z
        cmake --build build
        ccache -s

    - name: Test
      working-directory: build
      run: ctest --output-on-failure -j4

    - name: Install & Package SDK
      run: |
        VERSION=${{ github.ref_name }}
        VERSION=$(echo "$VERSION" | tr '/' '-')
        cmake --install build --prefix vioavr-linux-x64
        mv vioavr-linux-x64 vioavr-$VERSION-linux-x86_64
        tar -czf vioavr-$VERSION-linux-x86_64.tar.gz vioavr-$VERSION-linux-x86_64/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vioavr-linux-x64
        path: vioavr-*-linux-x86_64.tar.gz

  macos:
    name: Build & Package (macOS)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache Microchip DFP packs
      uses: actions/cache@v4
      with:
        path: avr-pack/
        key: dfp-macos-${{ hashFiles('CMakeLists.txt') }}

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-macos-${{ github.sha }}
        restore-keys: ccache-macos-

    - name: Install dependencies
      run: |
        brew update
        brew install ninja ccache
        brew install avr-gcc 2>/dev/null || true

    - name: Configure CMake
      run: >
        cmake -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DVIOAVR_USE_NATIVE_ARCH=OFF
        -DVIOAVR_ALLOW_ANY_GENERATOR=ON
        -DVIOAVR_BUILD_COSIM=OFF
      env:
        CC: clang
        CXX: clang++

    - name: Build
      run: |
        ccache -z
        cmake --build build
        ccache -s

    - name: Test
      working-directory: build
      run: ctest --output-on-failure -j4

    - name: Install & Package SDK
      run: |
        VERSION=${{ github.ref_name }}
        VERSION=$(echo "$VERSION" | tr '/' '-')
        cmake --install build --prefix vioavr-macos-arm64
        mv vioavr-macos-arm64 vioavr-$VERSION-macos-arm64
        tar -czf vioavr-$VERSION-macos-arm64.tar.gz vioavr-$VERSION-macos-arm64/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vioavr-macos-arm64
        path: vioavr-*-macos-arm64.tar.gz

  windows:
    name: Build & Package (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-avr-gcc
          mingw-w64-x86_64-avr-libc
          zip

    - name: Cache Microchip DFP packs
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/avr-pack/
        key: dfp-windows-${{ hashFiles('CMakeLists.txt') }}

    - name: Configure CMake
      run: >
        cmake -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DVIOAVR_USE_NATIVE_ARCH=OFF
        -DVIOAVR_ALLOW_ANY_GENERATOR=ON
        -DVIOAVR_BUILD_COSIM=OFF

    - name: Build
      run: cmake --build build

    - name: Test
      working-directory: build
      run: ctest --output-on-failure -j4

    - name: Install & Package SDK
      run: |
        VERSION=${{ github.ref_name }}
        VERSION=$(echo "$VERSION" | tr '/' '-')
        cmake --install build --prefix vioavr-windows-x64
        mv vioavr-windows-x64 vioavr-$VERSION-windows-x64
        zip -r vioavr-$VERSION-windows-x64.zip vioavr-$VERSION-windows-x64/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vioavr-windows-x64
        path: vioavr-*-windows-x64.zip

  coverage:
    name: Code Coverage (Linux)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache Microchip DFP packs
      uses: actions/cache@v4
      with:
        path: avr-pack/
        key: dfp-linux-${{ hashFiles('CMakeLists.txt') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ninja-build gcc-avr avr-libc binutils-avr \
          python3 lcov

    - name: Configure CMake
      run: >
        cmake -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Debug
        -DVIOAVR_ENABLE_COVERAGE=ON
        -DVIOAVR_USE_NATIVE_ARCH=OFF
        -DVIOAVR_ALLOW_ANY_GENERATOR=ON
        -DVIOAVR_BUILD_COSIM=OFF

    - name: Build
      run: cmake --build build

    - name: Run Tests & Generate Coverage
      run: |
        ctest --test-dir build --output-on-failure -j4
        lcov --directory build --capture --output-file coverage.info || true
        # Filter out system headers, tests, and third-party files
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/usr/*' '*/avr-pack/*' '*/external_projects/*' --output-file coverage.info || true
        lcov --list coverage.info || true

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: coverage.info

  release:
    name: Create GitHub Release
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true

    - name: Generate Checksums
      run: |
        sha256sum vioavr-* > checksums.txt
        echo "### Release Asset Checksums (SHA-256)" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        cat checksums.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

    - name: Create Release & Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          vioavr-*
          checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

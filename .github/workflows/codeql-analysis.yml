name: "CodeQL Analysis"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '30 2 * * 6' # Run every Saturday at 2:30 AM

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache Microchip DFP packs
      uses: actions/cache@v4
      with:
        path: avr-pack/
        key: dfp-codeql-${{ hashFiles('CMakeLists.txt') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ninja-build \
          gcc-avr avr-libc binutils-avr \
          python3

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Configure CMake
      run: >
        cmake -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DVIOAVR_USE_NATIVE_ARCH=OFF
        -DVIOAVR_ALLOW_ANY_GENERATOR=ON
        -DVIOAVR_BUILD_COSIM=OFF

    - name: Build
      run: cmake --build build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
